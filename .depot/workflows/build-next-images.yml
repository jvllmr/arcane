name: Build Next Versions of Arcane and CLI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-next-images
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-next-images:
    runs-on: depot-ubuntu-24.04-32

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v6
        with:
          run_install: true

      - name: Setup Just
        uses: taiki-e/install-action@just

      - name: Setup git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Set up Depot CLI
        uses: depot/setup-action@v1

      - name: Setup depot buildx driver
        id: setup-buildx-driver
        run: |
          depot configure-docker

      # - name: Snapshot Setup Environment
      #   uses: depot/snapshot-action@v1
      #   with:
      #     image: g7r5wqb57k.registry.depot.dev/arcane-env:latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME }}
          password: ${{ secrets.ARCANE_BOT_TOKEN }}

      - name: Compute next image version
        id: next-version
        run: just next-image-version github-output

      - name: Capture frontend build versions
        id: frontend-versions
        run: |
          echo "node_version=$(node --version)" >> "$GITHUB_OUTPUT"
          echo "sveltekit_version=$(pnpm -C frontend exec node -p 'require("@sveltejs/kit/package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 #v7.0.0
        with:
          distribution: goreleaser-pro
          version: "~> 2"
          args: release --clean --nightly --skip=announce,validate,homebrew
        env:
          GITHUB_TOKEN: ${{ secrets.ARCANE_BOT_TOKEN }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          BUILD_NEXT: "true"
          SKIP_RELEASE: "true"
          SKIP_CHANGELOG: "true"
          NEXT_IMAGE_VERSION: ${{ steps.next-version.outputs.version }}
          GORELEASER_CURRENT_TAG: ${{ steps.next-version.outputs.image_tag }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.next-version.outputs.previous_tag }}
          NODE_VERSION: ${{ steps.frontend-versions.outputs.node_version }}
          SVELTEKIT_VERSION: ${{ steps.frontend-versions.outputs.sveltekit_version }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
